<section class="hero">
  <h1>Raise a Complaint</h1>
  <p>Submit your issue and we’ll resolve it quickly</p>
</section>

<section class="complaint-section">

  <form class="glass-card complaint-form" id="complaintForm">

    <!-- TITLE -->
    <div class="input-group">
      <label>Complaint Title</label>
      <div class="input-box">
        <i class="fa fa-pen"></i>
        <input type="text" id="title" placeholder="Enter complaint title" required>
      </div>
    </div>

    <!-- CATEGORY -->
    <div class="input-group">
      <label>Category</label>
      <select id="category">
        <option>Hostel</option>
        <option>IT / WiFi</option>
        <option>Fees</option>
        <option>Library</option>
      </select>
    </div>

    <!-- DESCRIPTION -->
    <div class="input-group">
      <label>Description</label>
      <textarea rows="4" id="description" placeholder="Describe your issue clearly..." required></textarea>
    </div>

    <!-- SUBMIT -->
    <button type="submit" class="btn-primary">Submit Complaint</button>

  </form>

</section>

<script type="module" src="firebase.js"></script>
<script type="module" src="complaint.js"></script>

</body>
